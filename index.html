<!DOCTYPE html>
<html>
<head>
<title>Sistema Residencias</title>
<style>
body{
font-family:'Segoe UI';
background:linear-gradient(135deg,#4e73df,#1cc88a);
margin:0;
padding:30px;
}
.container{
background:white;
padding:25px;
border-radius:15px;
box-shadow:0px 10px 25px rgba(0,0,0,0.2);
max-width:1300px;
margin:auto;
}
h2{text-align:center; color:#333;}
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:10px;
margin-bottom:15px;
}
input, select{
padding:8px;
border-radius:8px;
border:1px solid #ccc;
width:100%;
box-sizing:border-box;
}
button{
padding:8px 12px;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}
.btn-primary{background:#4e73df;color:white;}
.btn-danger{background:#e74a3b;color:white;}
.btn-warning{background:#f6c23e;color:black;}
.btn-success{background:#1cc88a;color:white;}
.btn-info{background:#36b9cc;color:white;}
table{
width:100%;
border-collapse:collapse;
margin-top:20px;
font-size:13px;
}
th{
background:#4e73df;
color:white;
padding:8px;
position:sticky;
top:0;
cursor:pointer;
}
th:hover{
background:#2e59d9;
}
td{
padding:6px;
border-bottom:1px solid #ddd;
text-align:center;
}
tr:hover{background:#f5f5f5;}
.search{
margin-bottom:10px;
text-align:right;
}
.status-bar{
background:#f8f9fc;
padding:10px;
border-radius:8px;
margin-bottom:15px;
text-align:center;
color:#4e73df;
font-weight:bold;
}
.orden-indicador{
font-size:12px;
margin-left:5px;
}
</style>
</head>
<body>

<div class="container">

<h2>Sistema de Residencias Profesionales</h2>

<div class="status-bar" id="statusBar">
    Conectando al servidor...
</div>

<div class="grid">
<input id="proyecto" placeholder="Título del proyecto *">
<input id="matricula" placeholder="Matrícula *">
<input id="nombre_alumno" placeholder="Nombre del alumno *">
<input id="apellido_alumno" placeholder="Apellido del alumno *">
<input id="nombre_ase_int" placeholder="Nombre asesor interno">
<input id="apellido_ase_int" placeholder="Apellido asesor interno">
<input id="nombre_ase_ext" placeholder="Nombre asesor externo">
<input id="apellido_ase_ext" placeholder="Apellido asesor externo">
<input id="nombre_empresa" placeholder="Empresa *">
<input id="nombre_periodo" placeholder="Periodo">
<input id="fecha_inicio" type="date">
<input id="fecha_fin" type="date">
</div>

<div>
<button class="btn-primary" onclick="registrar()">💾 Guardar</button>
<button class="btn-success" onclick="limpiarFormulario()" style="margin-left:10px;">🆕 Nuevo</button>
<button class="btn-warning" onclick="cargar()" style="margin-left:10px;">🔄 Actualizar</button>
</div>

<div class="search">
<input id="buscar" placeholder="🔍 Buscar por proyecto, empresa o matrícula..." onkeyup="filtrar()">
</div>

<table>
<thead>
<tr>
<th onclick="ordenarPor('matricula')">Matrícula <span class="orden-indicador" id="orden-matricula">↕️</span></th>
<th onclick="ordenarPor('alumno')">Alumno <span class="orden-indicador" id="orden-alumno">↕️</span></th>
<th onclick="ordenarPor('proyecto')">Proyecto <span class="orden-indicador" id="orden-proyecto">↕️</span></th>
<th onclick="ordenarPor('empresa')">Empresa <span class="orden-indicador" id="orden-empresa">↕️</span></th>
<th onclick="ordenarPor('periodo')">Periodo <span class="orden-indicador" id="orden-periodo">↕️</span></th>
<th>Asesor Interno</th>
<th>Asesor Externo</th>
<th>Acciones</th>
</tr>
</thead>
<tbody id="tabla">
<tr><td colspan="8" style="text-align:center;">Cargando datos...</td></tr>
</tbody>
</table>

</div>

<script>
const API = "https://web-production-e1c80.up.railway.app";
let datosGlobal = [];
let datosFiltrados = [];
let editandoId = null;

// Variables para ordenamiento
let columnaOrden = 'empresa';
let ordenAscendente = true;

function actualizarStatus(mensaje, esError = false) {
    const statusBar = document.getElementById('statusBar');
    statusBar.textContent = mensaje;
    statusBar.style.background = esError ? '#f8d7da' : '#f8f9fc';
    statusBar.style.color = esError ? '#721c24' : '#4e73df';
}

function ordenarPor(columna) {
    document.querySelectorAll('.orden-indicador').forEach(el => el.textContent = '↕️');
    
    if (columnaOrden === columna) {
        ordenAscendente = !ordenAscendente;
    } else {
        columnaOrden = columna;
        ordenAscendente = true;
    }
    
    const indicador = document.getElementById(`orden-${columna}`);
    if (indicador) {
        indicador.textContent = ordenAscendente ? '↑' : '↓';
    }
    
    const datosAOrdenar = datosFiltrados.length > 0 ? datosFiltrados : datosGlobal;
    
    datosAOrdenar.sort((a, b) => {
        let valA, valB;
        
        switch(columna) {
            case 'matricula':
                valA = (a.matricula || '').toLowerCase();
                valB = (b.matricula || '').toLowerCase();
                break;
            case 'alumno':
                valA = (a.alumno || '').toLowerCase();
                valB = (b.alumno || '').toLowerCase();
                break;
            case 'proyecto':
                valA = (a.proyecto || '').toLowerCase();
                valB = (b.proyecto || '').toLowerCase();
                break;
            case 'empresa':
                valA = (a.empresa || '').toLowerCase();
                valB = (b.empresa || '').toLowerCase();
                break;
            case 'periodo':
                valA = (a.periodo || '').toLowerCase();
                valB = (b.periodo || '').toLowerCase();
                break;
            default:
                return 0;
        }
        
        if (valA < valB) return ordenAscendente ? -1 : 1;
        if (valA > valB) return ordenAscendente ? 1 : -1;
        return 0;
    });
    
    mostrar(datosAOrdenar);
}

function cargar() {
    actualizarStatus('Cargando datos...');
    
    fetch(API + "/proyectos")
        .then(r => {
            if (!r.ok) throw new Error('Error al cargar datos');
            return r.json();
        })
        .then(data => {
            console.log("Datos recibidos:", data);
            datosGlobal = data;
            datosFiltrados = [];
            ordenarPor('empresa');
            actualizarStatus(`✅ ${data.length} registros cargados correctamente`);
        })
        .catch(error => {
            console.error('Error:', error);
            actualizarStatus('Error al cargar los datos', true);
            document.getElementById('tabla').innerHTML = 
                '<tr><td colspan="8" style="text-align:center; color:#e74a3b;">Error al cargar datos. Verifica la conexión.</td></tr>';
        });
}

function mostrar(data) {
    let tabla = document.getElementById("tabla");
    
    if (!data || data.length === 0) {
        tabla.innerHTML = '<tr><td colspan="8" style="text-align:center;">No hay datos disponibles</td></tr>';
        return;
    }
    
    tabla.innerHTML = "";
    
    data.forEach(p => {
        const idRegistro = p.id_proyecto || p.id;
        const matricula = p.matricula || 'N/A';
        const alumno = p.alumno || 'N/A';
        const proyecto = p.proyecto || 'N/A';
        const empresa = p.empresa || 'N/A';
        const periodo = p.periodo || 'N/A';
        
        // Asesores
        let asesorInterno = p.asesor_interno || '';
        if (!asesorInterno || asesorInterno.trim() === '') asesorInterno = '-';
        
        let asesorExterno = p.asesor_externo || '';
        if (!asesorExterno || asesorExterno.trim() === '') asesorExterno = '-';
        
        tabla.innerHTML += `
        <tr>
            <td>${matricula}</td>
            <td>${alumno}</td>
            <td>${proyecto}</td>
            <td>${empresa}</td>
            <td>${periodo}</td>
            <td>${asesorInterno}</td>
            <td>${asesorExterno}</td>
            <td>
                <button class="btn-danger" onclick="eliminar(${idRegistro})" title="Eliminar">🗑️ Eliminar</button>
            </td>
        </tr>
        `;
    });
}

function registrar() {
    if (!proyecto.value.trim() || !matricula.value.trim() || !nombre_alumno.value.trim() || !nombre_empresa.value.trim()) {
        alert('Los campos marcados con * son obligatorios');
        return;
    }
    
    const datos = {
        proyecto: proyecto.value.trim(),
        matricula: matricula.value.trim(),
        nombre_alumno: nombre_alumno.value.trim(),
        apellido_alumno: apellido_alumno.value.trim(),
        nombre_ase_int: nombre_ase_int.value.trim(),
        apellido_ase_int: apellido_ase_int.value.trim(),
        nombre_ase_ext: nombre_ase_ext.value.trim(),
        apellido_ase_ext: apellido_ase_ext.value.trim(),
        nombre_empresa: nombre_empresa.value.trim(),
        nombre_periodo: nombre_periodo.value.trim(),
        fecha_inicio: fecha_inicio.value,
        fecha_fin: fecha_fin.value
    };
    
    actualizarStatus(editandoId ? 'Actualizando registro...' : 'Guardando registro...');
    
    const url = editandoId ? `${API}/editar/${editandoId}` : `${API}/registrar`;
    const method = editandoId ? "PUT" : "POST";
    
    fetch(url, {
        method: method,
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(datos)
    })
    .then(response => {
        if (!response.ok) throw new Error('Error en la petición');
        return response.json();
    })
    .then(() => {
        actualizarStatus(editandoId ? 'Registro actualizado' : 'Registro guardado');
        limpiarFormulario();
        cargar();
    })
    .catch(error => {
        console.error('Error:', error);
        actualizarStatus('Error al guardar', true);
        alert('Error al guardar. Revisa la consola.');
    });
}

function eliminar(id) {
    console.log("Eliminando ID:", id);
    if (confirm('¿Estás seguro de eliminar este registro?')) {
        actualizarStatus('Eliminando registro...');
        
        fetch(`${API}/eliminar/${id}`, { 
            method: "DELETE",
            headers: {
                'Content-Type': 'application/json'
            }
        })
        .then(async response => {
            const data = await response.json();
            if (!response.ok) {
                throw new Error(data.error || 'Error al eliminar');
            }
            return data;
        })
        .then(data => {
            console.log("Respuesta:", data);
            actualizarStatus('Registro eliminado');
            cargar();
        })
        .catch(error => {
            console.error('Error completo:', error);
            actualizarStatus('Error al eliminar', true);
            alert('Error al eliminar: ' + error.message);
        });
    }
}

function limpiarFormulario() {
    editandoId = null;
    proyecto.value = '';
    matricula.value = '';
    nombre_alumno.value = '';
    apellido_alumno.value = '';
    nombre_ase_int.value = '';
    apellido_ase_int.value = '';
    nombre_ase_ext.value = '';
    apellido_ase_ext.value = '';
    nombre_empresa.value = '';
    nombre_periodo.value = '';
    fecha_inicio.value = '';
    fecha_fin.value = '';
    actualizarStatus('Nuevo registro');
}

function filtrar() {
    const texto = buscar.value.toLowerCase().trim();
    
    if (!texto) {
        datosFiltrados = [];
        ordenarPor(columnaOrden);
        return;
    }
    
    datosFiltrados = datosGlobal.filter(p => {
        const proyecto = (p.proyecto || '').toLowerCase();
        const empresa = (p.empresa || '').toLowerCase();
        const matricula = (p.matricula || '').toLowerCase();
        const alumno = (p.alumno || '').toLowerCase();
        
        return proyecto.includes(texto) || 
               empresa.includes(texto) || 
               matricula.includes(texto) ||
               alumno.includes(texto);
    });
    
    ordenarPor(columnaOrden);
    actualizarStatus(`Mostrando ${datosFiltrados.length} de ${datosGlobal.length} registros`);
}

function verificarConexion() {
    fetch(API + "/test")
        .then(r => r.json())
        .then(data => {
            console.log("Test exitoso:", data);
            actualizarStatus('Conectado al servidor');
            cargar();
        })
        .catch(error => {
            console.error("Error de conexión:", error);
            actualizarStatus('No se pudo conectar al servidor', true);
        });
}

// Iniciar
verificarConexion();
</script>

</body>
</html>
