<!DOCTYPE html>
<html>
<head>
<title>Sistema Residencias</title>
<style>
body{
font-family:'Segoe UI';
background:linear-gradient(135deg,#4e73df,#1cc88a);
margin:0;
padding:30px;
}
.container{
background:white;
padding:25px;
border-radius:15px;
box-shadow:0px 10px 25px rgba(0,0,0,0.2);
max-width:1300px;
margin:auto;
}
h2{text-align:center; color:#333;}
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:10px;
margin-bottom:15px;
}
input, select{
padding:8px;
border-radius:8px;
border:1px solid #ccc;
width:100%;
box-sizing:border-box;
}
button{
padding:8px 12px;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}
.btn-primary{background:#4e73df;color:white;}
.btn-danger{background:#e74a3b;color:white;}
.btn-warning{background:#f6c23e;color:black;}
.btn-success{background:#1cc88a;color:white;}
table{
width:100%;
border-collapse:collapse;
margin-top:20px;
font-size:14px;
}
th{
background:#4e73df;
color:white;
padding:10px;
}
td{
padding:8px;
border-bottom:1px solid #ddd;
text-align:center;
}
tr:hover{background:#f5f5f5;}
.search{
margin-bottom:10px;
text-align:right;
}
.status-bar{
background:#f8f9fc;
padding:10px;
border-radius:8px;
margin-bottom:15px;
text-align:center;
color:#4e73df;
font-weight:bold;
}
</style>
</head>
<body>

<div class="container">

<h2>Sistema de Residencias Profesionales</h2>

<div class="status-bar" id="statusBar">
    Conectando al servidor...
</div>

<div class="grid">
<input id="proyecto" placeholder="Título del proyecto *" value="Plataforma Virtual">
<input id="matricula" placeholder="Matrícula *" value="2023001">
<input id="nombre_alumno" placeholder="Nombre del alumno *" value="Juan">
<input id="apellido_alumno" placeholder="Apellido del alumno *" value="Pérez">
<input id="nombre_ase_int" placeholder="Nombre asesor interno" value="Carlos">
<input id="apellido_ase_int" placeholder="Apellido asesor interno" value="López">
<input id="nombre_ase_ext" placeholder="Nombre asesor externo" value="María">
<input id="apellido_ase_ext" placeholder="Apellido asesor externo" value="García">
<input id="nombre_empresa" placeholder="Empresa *" value="Tecnología SA">
<input id="nombre_periodo" placeholder="Periodo" value="Ene-Jun 2026">
<input id="fecha_inicio" type="date" value="2026-03-01">
<input id="fecha_fin" type="date" value="2026-08-31">
</div>

<div>
<button class="btn-primary" onclick="registrar()">Guardar</button>
<button class="btn-success" onclick="limpiarFormulario()" style="margin-left:10px;">🆕 Nuevo</button>
<button class="btn-warning" onclick="cargar()" style="margin-left:10px;">Actualizar</button>
</div>

<div class="search">
<input id="buscar" placeholder="Buscar por proyecto, empresa o matrícula..." onkeyup="filtrar()">
</div>

<table>
<thead>
<tr>
<th>ID</th>
<th>Matrícula</th>
<th>Alumno</th>
<th>Proyecto</th>
<th>Empresa</th>
<th>Periodo</th>
<th>Acciones</th>
</tr>
</thead>
<tbody id="tabla">
<tr><td colspan="7" style="text-align:center;">Cargando datos...</td></tr>
</tbody>
</table>

</div>

<script>
const API = "https://web-production-e1c80.up.railway.app";
let datosGlobal = [];
let editandoId = null;

function actualizarStatus(mensaje, esError = false) {
    const statusBar = document.getElementById('statusBar');
    statusBar.textContent = mensaje;
    statusBar.style.background = esError ? '#f8d7da' : '#f8f9fc';
    statusBar.style.color = esError ? '#721c24' : '#4e73df';
}

function cargar() {
    actualizarStatus('Cargando datos...');
    
    fetch(API + "/proyectos")
        .then(r => {
            if (!r.ok) throw new Error('Error al cargar datos');
            return r.json();
        })
        .then(data => {
            console.log("Datos recibidos:", data);
            datosGlobal = data;
            mostrar(data);
            actualizarStatus(`${data.length} registros cargados correctamente`);
        })
        .catch(error => {
            console.error('Error:', error);
            actualizarStatus('Error al cargar los datos', true);
            document.getElementById('tabla').innerHTML = 
                '<tr><td colspan="7" style="text-align:center; color:#e74a3b;">Error al cargar datos. Verifica la conexión.</td></tr>';
        });
}

function mostrar(data) {
    let tabla = document.getElementById("tabla");
    
    if (!data || data.length === 0) {
        tabla.innerHTML = '<tr><td colspan="7" style="text-align:center;">No hay datos disponibles</td></tr>';
        return;
    }
    
    tabla.innerHTML = "";
    
    data.forEach(p => {
        // Extraer datos según la estructura que vimos en /test
        const id = p.id_proyecto || p.id || '';
        const matricula = p.matricula || 'N/A';
        
        // Construir nombre del alumno
        let alumno = 'N/A';
        if (p.nombre_alumno || p.apellido_alumno) {
            alumno = `${p.nombre_alumno || ''} ${p.apellido_alumno || ''}`.trim();
        } else if (p.alumno) {
            alumno = p.alumno;
        }
        
        const proyecto = p.proyecto || p.titulo || 'N/A';
        const empresa = p.nombre_empresa || p.empresa || 'N/A';
        const periodo = p.nombre_periodo || p.periodo || 'N/A';
        
        tabla.innerHTML += `
        <tr>
            <td>${id}</td>
            <td>${matricula}</td>
            <td>${alumno}</td>
            <td>${proyecto}</td>
            <td>${empresa}</td>
            <td>${periodo}</td>
            <td>
                <button class="btn-warning" onclick="cargarEdicion(${id})" style="margin-right:5px;"> Editar</button>
                <button class="btn-danger" onclick="eliminar(${id})">🗑️ Eliminar</button>
            </td>
        </tr>
        `;
    });
}

function registrar() {
    // Validaciones básicas
    if (!proyecto.value.trim() || !matricula.value.trim() || !nombre_alumno.value.trim() || !nombre_empresa.value.trim()) {
        alert('Los campos marcados con * son obligatorios');
        return;
    }
    
    const datos = {
        proyecto: proyecto.value.trim(),
        matricula: matricula.value.trim(),
        nombre_alumno: nombre_alumno.value.trim(),
        apellido_alumno: apellido_alumno.value.trim(),
        nombre_ase_int: nombre_ase_int.value.trim(),
        apellido_ase_int: apellido_ase_int.value.trim(),
        nombre_ase_ext: nombre_ase_ext.value.trim(),
        apellido_ase_ext: apellido_ase_ext.value.trim(),
        nombre_empresa: nombre_empresa.value.trim(),
        nombre_periodo: nombre_periodo.value.trim(),
        fecha_inicio: fecha_inicio.value,
        fecha_fin: fecha_fin.value
    };
    
    console.log("Enviando datos:", datos);
    
    actualizarStatus(editandoId ? 'Actualizando registro...' : 'Guardando registro...');
    
    const url = editandoId ? `${API}/editar/${editandoId}` : `${API}/registrar`;
    const method = editandoId ? "PUT" : "POST";
    
    fetch(url, {
        method: method,
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(datos)
    })
    .then(response => {
        if (!response.ok) throw new Error('Error en la petición');
        return response.json();
    })
    .then(resultado => {
        console.log("Respuesta:", resultado);
        actualizarStatus(editandoId ? 'Registro actualizado' : 'Registro guardado');
        limpiarFormulario();
        cargar();
    })
    .catch(error => {
        console.error('Error:', error);
        actualizarStatus('Error al guardar', true);
        alert('Error al guardar. Revisa la consola para más detalles.');
    });
}

function eliminar(id) {
    if (confirm('¿Estás seguro de eliminar este registro?')) {
        actualizarStatus('Eliminando registro...');
        
        fetch(`${API}/eliminar/${id}`, { method: "DELETE" })
        .then(response => {
            if (!response.ok) throw new Error('Error al eliminar');
            return response.json();
        })
        .then(() => {
            actualizarStatus('Registro eliminado');
            cargar();
        })
        .catch(error => {
            console.error('Error:', error);
            actualizarStatus('Error al eliminar', true);
            alert('Error al eliminar');
        });
    }
}

function cargarEdicion(id) {
    const proyecto_data = datosGlobal.find(p => (p.id_proyecto == id || p.id == id));
    
    if (!proyecto_data) {
        alert('No se encontraron datos del proyecto');
        return;
    }
    
    editandoId = id;
    
    // Llenar el formulario
    proyecto.value = proyecto_data.proyecto || proyecto_data.titulo || '';
    matricula.value = proyecto_data.matricula || '';
    nombre_alumno.value = proyecto_data.nombre_alumno || '';
    apellido_alumno.value = proyecto_data.apellido_alumno || '';
    nombre_ase_int.value = proyecto_data.nombre_ase_int || '';
    apellido_ase_int.value = proyecto_data.apellido_ase_int || '';
    nombre_ase_ext.value = proyecto_data.nombre_ase_ext || '';
    apellido_ase_ext.value = proyecto_data.apellido_ase_ext || '';
    nombre_empresa.value = proyecto_data.nombre_empresa || proyecto_data.empresa || '';
    nombre_periodo.value = proyecto_data.nombre_periodo || proyecto_data.periodo || '';
    
    // Formatear fechas si existen
    if (proyecto_data.fecha_inicio) {
        fecha_inicio.value = proyecto_data.fecha_inicio.split('T')[0];
    }
    if (proyecto_data.fecha_fin) {
        fecha_fin.value = proyecto_data.fecha_fin.split('T')[0];
    }
    
    actualizarStatus(`Editando proyecto ID: ${id}`);
}

function limpiarFormulario() {
    editandoId = null;
    proyecto.value = '';
    matricula.value = '';
    nombre_alumno.value = '';
    apellido_alumno.value = '';
    nombre_ase_int.value = '';
    apellido_ase_int.value = '';
    nombre_ase_ext.value = '';
    apellido_ase_ext.value = '';
    nombre_empresa.value = '';
    nombre_periodo.value = '';
    fecha_inicio.value = '';
    fecha_fin.value = '';
    actualizarStatus('Nuevo registro');
}

function filtrar() {
    const texto = buscar.value.toLowerCase().trim();
    
    if (!texto) {
        mostrar(datosGlobal);
        return;
    }
    
    const filtrado = datosGlobal.filter(p => {
        const proyecto = (p.proyecto || p.titulo || '').toLowerCase();
        const empresa = (p.nombre_empresa || p.empresa || '').toLowerCase();
        const matricula = (p.matricula || '').toLowerCase();
        const alumno = ((p.nombre_alumno || '') + ' ' + (p.apellido_alumno || '')).toLowerCase();
        
        return proyecto.includes(texto) || 
               empresa.includes(texto) || 
               matricula.includes(texto) ||
               alumno.includes(texto);
    });
    
    mostrar(filtrado);
    actualizarStatus(`Mostrando ${filtrado.length} de ${datosGlobal.length} registros`);
}

// Verificar conexión al iniciar
function verificarConexion() {
    fetch(API + "/test")
        .then(r => r.json())
        .then(data => {
            console.log("Test exitoso:", data);
            actualizarStatus('Conectado al servidor');
            cargar();
        })
        .catch(error => {
            console.error("Error de conexión:", error);
            actualizarStatus('No se pudo conectar al servidor', true);
        });
}

// Iniciar
verificarConexion();
</script>

</body>
</html>
