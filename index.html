<!DOCTYPE html>
<html>
<head>
    <title>Test Sistema Residencias</title>
</head>
<body>
    <h2>Test de Conexión</h2>
    
    <button onclick="testCargar()">Probar Cargar Datos</button>
    <button onclick="testRegistrar()">Probar Registrar</button>
    
    <div id="resultado" style="margin-top:20px; padding:10px; border:1px solid #ccc;"></div>
    
    <script>
        const API = "https://web-production-e1c80.up.railway.app";
        
        function testCargar() {
            fetch(API + "/proyectos")
                .then(r => r.json())
                .then(data => {
                    document.getElementById('resultado').innerHTML = 
                        '<h3>Datos recibidos:</h3>' + 
                        '<pre>' + JSON.stringify(data, null, 2) + '</pre>';
                })
                .catch(error => {
                    document.getElementById('resultado').innerHTML = 
                        '<h3>Error:</h3>' + error;
                });
        }
        
        function testRegistrar() {
            let datos = {
                proyecto: "Test Proyecto",
                matricula: "TEST123",
                nombre_alumno: "Juan",
                apellido_alumno: "Pérez",
                nombre_ase_int: "Carlos",
                apellido_ase_int: "López",
                nombre_ase_ext: "María",
                apellido_ase_ext: "García",
                nombre_empresa: "Test Empresa",
                nombre_periodo: "Ene-Jun 2024",
                fecha_inicio: "2024-01-01",
                fecha_fin: "2024-06-30"
            };
            
            fetch(API + "/registrar", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify(datos)
            })
            .then(r => r.json())
            .then(data => {
                document.getElementById('resultado').innerHTML = 
                    '<h3>Respuesta:</h3>' + 
                    '<pre>' + JSON.stringify(data, null, 2) + '</pre>';
                testCargar(); // Cargar automáticamente después de registrar
            })
            .catch(error => {
                document.getElementById('resultado').innerHTML = 
                    '<h3>Error:</h3>' + error;
            });
        }
    </script>
</body>
</html>
